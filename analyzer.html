<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキレシピ解析ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4ff; color: #333; }
    header { background: #e63946; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 1.8rem; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    textarea { width: 100%; height: 200px; padding: 15px; font-size: 0.95rem; border: 2px solid #ccc; border-radius: 8px; resize: vertical; }
    .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #c1121f; }
    .results { margin-top: 30px; }
    .card-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card-name { font-weight: bold; }
    .card-count { background: #e63946; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
    .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; color: #e63946; }
    .placeholder { text-align: center; color: #999; margin-top: 20px; }
  </style>
</head>
