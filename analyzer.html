<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキレシピ解析ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4ff; color: #333; padding: 20px; }
    header { background: #e63946; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
    header h1 { font-size: 1.8rem; }
    header p { margin-top: 5px; }
    textarea { width: 100%; height: 200px; padding: 15px; font-size: 0.95rem; border: 2px solid #ccc; border-radius: 8px; resize: vertical; display: block; }
    button { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #c1121f; }
    .results { margin-top: 20px; }
    .card-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card-name { font-weight: bold; }
    .card-count { background: #e63946; color: white; padding: 4px 12px; border-radius: 20px; }
    .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; color: #e63946; }
    p { color: #999; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>🎴 デッキレシピ解析ツール</h1>
    <p>Xで見つけたデッキレシピを貼り付けて解析しよう</p>
  </header>

  <textarea id="recipeInput" placeholder="ここにデッキレシピを貼り付けてください
例:
ピカチュウex 4
博士の研究 4
ネストボール 3
基本雷エネルギー 10"></textarea>

  <button onclick="analyzeRecipe()">解析する</button>

  <div class="results" id="results">
    <p>デッキレシピを貼り付けて「解析する」を押してください</p>
  </div>

  <script>
    function analyzeRecipe() {
      const input = document.getElementById('recipeInput').value;
      const results = document.getElementById('results');
      if (!input.trim()) {
        results.innerHTML = '<p>デッキレシピを入力してください</p>';
        return;
      }
      const lines = input.split('\n').filter(line => line.trim());
      const pokemon = [], trainer = [], energy = [];
      lines.forEach(line => {
        const match = line.match(/^(.+?)\s+(\d+)$/);
        if (!match) return;
        const name = match[1].trim();
        const count = parseInt(match[2]);
        if (name.includes('エネルギー') || name.includes('エネ')) {
          energy.push({ name, count });
        } else if (['博士','ボール','ナンジャモ','ボスの指令','ジャッジマン','マリィ','セレナ','キバナ','スタジアム','グッズ'].some(t => name.includes(t))) {
          trainer.push({ name, count });
        } else {
          pokemon.push({ name, count });
        }
      });
      let html = '';
      if (pokemon.length) {
        html += '<div class="section-title">🔴 ポケモン</div>';
        pokemon.forEach(c => { html += `<div class="card-item"><span class="card-name">${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
      }
      if (trainer.length) {
        html += '<div class="section-title">🔵 トレーナーズ</div>';
        trainer.forEach(c => { html += `<div class="card-item"><span class="card-name">${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
      }
      if (energy.length) {
        html += '<div class="section-title">⚡ エネルギー</div>';
        energy.forEach(c => { html += `<div class="card-item"><span class="card-name">${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
      }
      if (!html) { results.innerHTML = '<p>カードが検出できませんでした</p>'; return; }
      results.innerHTML = html;
    }
  </script>
</body>
</html>
