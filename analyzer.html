<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキ画像解析ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4ff; color: #333; padding: 20px; }
    header { background: #e63946; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; }
    input { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; display: block; }
    button { width: 100%; padding: 12px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #c1121f; }
    .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; }
    .card-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card-count { background: #e63946; color: white; padding: 4px 12px; border-radius: 20px; }
    .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; color: #e63946; }
    #loading { text-align: center; padding: 20px; display: none; }
    .error { color: #e63946; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>🎴 デッキ画像解析ツール</h1>
    <p>pnoteの画像URLを貼り付けてデッキを解析しよう</p>
  </header>
  <div class="box">
    <label>🔑 APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <label>🖼️ 画像URL</label>
    <input type="text" id="imageUrl" placeholder="https://pbs.twimg.com/media/...">
    <button id="analyzeBtn">画像を解析する</button>
  </div>
  <div id="loading">🔍 AIが解析中...</div>
  <div id="results"></div>
  <script>
    document.getElementById('analyzeBtn').addEventListener('click', async function() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      if (!apiKey) { results.innerHTML = '<p class="error">APIキーを入力してください</p>'; return; }
      if (!imageUrl) { results.innerHTML = '<p class="error">画像URLを入力してください</p>'; return; }
      loading.style.display = 'block';
      results.innerHTML = '';
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'url', url: imageUrl } },
                { type: 'text', text: 'この画像はポケモンカードのデッキリストです。各カードの名前と枚数を読み取って、以下のJSON形式のみで返してください。{"pokemon":[{"name":"カード名","count":枚数}],"trainer":[{"name":"カード名","count":枚数}],"energy":[{"name":"カード名","count":枚数}]}' }
              ]
            }]
          })
        });
        const data = await response.json();
        loading.style.display = 'none';
        if (data.error) { results.innerHTML = `<p class="error">エラー: ${data.error.message}</p>`; return; }
        const text = data.content[0].text;
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        let html = '';
        if (parsed.pokemon && parsed.pokemon.length) {
          html += '<div class="section-title">🔴 ポケモン</div>';
          parsed.pokemon.forEach(c => { html += `<div class="card-item"><span>${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
        }
        if (parsed.trainer && parsed.trainer.length) {
          html += '<div class="section-title">🔵 トレーナーズ</div>';
          parsed.trainer.forEach(c => { html += `<div class="card-item"><span>${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
        }
        if (parsed.energy && parsed.energy.length) {
          html += '<div class="section-title">⚡ エネルギー</div>';
          parsed.energy.forEach(c => { html += `<div class="card-item"><span>${c.name}</span><span class="card-count">${c.count}枚</span></div>`; });
        }
        results.innerHTML = html || '<p class="error">カードが検出できませんでした</p>';
      } catch(e) {
        loading.style.display = 'none';
        results.innerHTML = `<p class="error">エラー: ${e.message}</p>`;
      }
    });
  </script>
</body>
</html>
