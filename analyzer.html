<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキ画像解析ツール</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4ff; color: #333; padding: 20px; }
    header { background: #e63946; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
    header h1 { font-size: 1.8rem; }
    header p { margin-top: 5px; }
    .input-area { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .input-area label { font-weight: bold; display: block; margin-bottom: 8px; }
    input[type="text"] { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
    input[type="password"] { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
    button { display: block; width: 100%; padding: 12px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #c1121f; }
    .preview { max-width: 100%; border-radius: 8px; margin: 10px 0; display: none; }
    .results { margin-top: 20px; }
    .card-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card-name { font-weight: bold; }
    .card-count { background: #e63946; color: white; padding: 4px 12px; border-radius: 20px; }
    .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; color: #e63946; }
    .loading { text-align: center; padding: 20px; color: #666; display: none; }
    .error { color: #e63946; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>🎴 デッキ画像解析ツール</h1>
    <p>pnoteの画像URLを貼り付けてデッキを解析しよう</p>
  </header>

  <div class="input-area">
    <label>🔑 APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    
    <label>🖼️ 画像URL（XのデッキURL）</label>
    <input type="text" id="imageUrl" placeholder="https://pbs.twimg.com/media/...">
    <img id="preview" class="preview">
    
    <button onclick="analyzeImage()">画像を解析する</button>
  </div>

  <div class="loading" id="loading">🔍 AIが画像を解析中...</div>
  <div class="results" id="results"></div>

  <script>
    document.getElementById('imageUrl').addEventListener('input', function() {
      const url = this.value.trim();
      const preview = document.getElementById('preview');
      if (url) {
        preview.src = url;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });

    async function analyzeImage() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');

      if (!apiKey) {
        results.innerHTML = '<p class="error">APIキーを入力してください</p>';
        return;
      }
      if (!imageUrl) {
        results.innerHTML = '<p class="error">画像URLを入力してください</p>';
        return;
      }

      loading.style.display = 'block';
      results.innerHTML = '';

          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },

            model: 'claude-opus-4-6',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: {
                    type: 'url',
                    url: imageUrl
                  }
                },

                  type: 'text',

                }
              ]
            }]
          })
        });

        const data = await response.json();
        loading.style.display = 'none';

          results.innerHTML = `<p class="error">エラー: ${data.error.message}</p>`;
          return;
        }
